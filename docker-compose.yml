services:
  db:
    image: postgres:16-alpine
    container_name: jobtracker_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Jobpass}
      POSTGRES_DB: ${POSTGRES_DB:-jobtracker}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobuser} -d ${POSTGRES_DB:-jobtracker}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: jobtracker_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-jobuser}:${POSTGRES_PASSWORD:-Jobpass}@db:5432/${POSTGRES_DB:-jobtracker}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: jobtracker_frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
    name: db_data
